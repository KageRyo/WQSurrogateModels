name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package with dev dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run test suite
        run: |
          pytest -q --tb=short

  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: wqsurrogatemodels:ci-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
          load: true

      - name: Quick smoke test inside Docker image
        run: |
          docker run --rm wqsurrogatemodels:ci-test python -c "
          from src.wqi import direct_wqi5_score, categorize_score
          score = direct_wqi5_score(7.2, 2.1, 0.3, 450, 12)
          print('WQI5 score:', round(score, 1))
          cat, band = categorize_score(score)
          print('Category:', cat)
          print('Docker smoke test passed.')
          "
